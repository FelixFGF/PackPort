spring.application.name=backend

server.port=${PORT:8080}

file.upload.tempDir=./temp_uploads
file.upload.tempExpirationMinutes=30

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Session cookie for cross-site usage (Netlify -> Render)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=None

# --- Production DB (environment variables only) ---
# Example:
# PACKPORT_DB_URL=jdbc:postgresql://host:5432/packport
# PACKPORT_DB_USERNAME=...
# PACKPORT_DB_PASSWORD=...
spring.datasource.url=${PACKPORT_DB_URL:jdbc:postgresql://localhost:5432/packport}
spring.datasource.username=${PACKPORT_DB_USERNAME:}
spring.datasource.password=${PACKPORT_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Flyway manage schema. On startup we only validate.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true