spring.application.name=backend

server.port=${PORT:8080}

file.upload.tempDir=./temp_uploads
file.upload.tempExpirationMinutes=30

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Session cookie for cross-site usage (Netlify -> Render)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=None

# --- Production DB (environment variables only) ---
# IMPORTANT: no localhost fallbacks; Render MUST provide these env vars.
# PACKPORT_DB_URL must be set, e.g. jdbc:postgresql://host:5432/packport
spring.datasource.url=${PACKPORT_DB_URL}
spring.datasource.username=${PACKPORT_DB_USERNAME}
spring.datasource.password=${PACKPORT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (do not attempt schema validation at startup)
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Avoid requiring JDBC metadata during early startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Flyway migrations (enabled by default; can be disabled via env var)
spring.flyway.enabled=${PACKPORT_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true